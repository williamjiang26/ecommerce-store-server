version: "3.8"

services:
  # --- Products Service ---
  db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: postgres_product_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Explicitly use user for username
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: product
    ports:
      - "5435:5432"
    volumes:
      - products_db_data:/var/lib/postgresql/data
    healthcheck: # Tells Docker when the DB is genuinely awake
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d product"]
      interval: 5s
      timeout: 5s
      retries: 5

  products-service:
    platform: linux/amd64
    build: ./products-service
    container_name: app_products
    restart: always
    ports:
      - "8001:8000"
    environment:
      PRODUCT_DATABASE_URL: ${PRODUCT_DATABASE_URL}
    volumes:
      - ./products-service:/app
    depends_on:
      db:
        condition: service_healthy
  # --- Orders Service ---
  orders_db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: postgres_order_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Explicitly use user for username
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: order
    ports:
      - "5436:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck: # Tells Docker when the DB is genuinely awake
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d order"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-service:
    platform: linux/amd64
    build: ./orders-service
    container_name: app_orders
    restart: always
    ports:
      - "8002:8000"
    environment:
      ORDER_DATABASE_URL: ${ORDER_DATABASE_URL}
    volumes:
      - ./orders-service:/app
    depends_on:
      orders_db:
        condition: service_healthy


  # --- Chats Service ---
  chats_db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: postgres_chat_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Explicitly use user for username
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: messages
    ports:
      - "5437:5432"
    volumes:
      - chats_db_data:/var/lib/postgresql/data
    healthcheck: # Tells Docker when the DB is genuinely awake
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d messages"]
      interval: 5s
      timeout: 5s
      retries: 5

  chats-service:
    platform: linux/amd64
    build: ./chats-service
    container_name: app_chats
    restart: always
    ports:
      - "8003:8000"
    environment:
      MESSAGE_DATABASE_URL: ${MESSAGE_DATABASE_URL}
      REDIS_URL: redis://redis-chat:6379/0
    volumes:
      - ./chats-service:/app
    depends_on:
      chats_db:
        condition: service_healthy
      redis-chat:
        condition: service_healthy
  # --- Customers Service ---
  customers_db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: postgres_customer_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Explicitly use user for username
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: customer
    ports:
      - "5438:5432"
    volumes:
      - customers_db_data:/var/lib/postgresql/data
    healthcheck: # Tells Docker when the DB is genuinely awake
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d customer"]
      interval: 5s
      timeout: 5s
      retries: 5

  customers-service:
    platform: linux/amd64
    build: ./customers-service
    container_name: app_customers
    restart: always
    ports:
      - "8005:8000"
    environment:
      CUSTOMER_DATABASE_URL: ${CUSTOMER_DATABASE_URL}
    volumes:
      - ./customers-service:/app
    depends_on:
      customers_db:
        condition: service_healthy

  # --- Employees Service ---
  employees_db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: postgres_employee_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Explicitly use user for username
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: employee
    ports:
      - "5433:5432"
    volumes:
      - employees_db_data:/var/lib/postgresql/data
    healthcheck: # Tells Docker when the DB is genuinely awake
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d employee"]
      interval: 5s
      timeout: 5s
      retries: 5

  employees-service:
    platform: linux/amd64
    build: ./employees-service
    container_name: app_employees
    restart: always
    ports:
      - "8006:8000"
    environment:
      EMPLOYEE_DATABASE_URL: ${EMPLOYEE_DATABASE_URL}
    volumes:
      - ./employees-service:/app
    depends_on:
      employees_db:
        condition: service_healthy

  # --- Essays Service ---
  essays_db:
    platform: linux/amd64
    image: postgres:15-alpine
    container_name: postgres_essay_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Explicitly use user for username
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: essay
    ports:
      - "5439:5432"
    volumes:
      - essays_db_data:/var/lib/postgresql/data
    healthcheck: # Tells Docker when the DB is genuinely awake
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d essay"]
      interval: 5s
      timeout: 5s
      retries: 5

  essays-service:
    platform: linux/amd64
    build: ./essays-service
    container_name: app_essays
    restart: always
    ports:
      - "8007:8000"
    environment:
      ESSAY_DATABASE_URL: ${ESSAY_DATABASE_URL}
    volumes:
      - ./essays-service:/app
    depends_on:
      essays_db:
        condition: service_healthy

  redis-chat:
    platform: linux/amd64
    image: redis:alpine
    container_name: chat_redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  products_db_data:
  orders_db_data:
  chats_db_data:

  customers_db_data:
  employees_db_data:
  essays_db_data:
  redis_data: