services:
  # --- Products Service ---
  - type: web # Change to pserv if this is an internal-only API
    name: products-service
    env: docker
    dockercontext: ./products-service
    dockerfilePath: ./products-service/Dockerfile
    plan: free
    envVars:
      - key: PRODUCT_DATABASE_URL
        fromDatabase:
          name: product-db
          property: connectionString

  # --- Orders Service ---
  - type: web
    name: orders-service
    env: docker
    dockercontext: ./orders-service
    dockerfilePath: ./orders-service/Dockerfile
    plan: free
    envVars:
      - key: ORDER_DATABASE_URL
        fromDatabase:
          name: order-db
          property: connectionString

  # --- Chats Service ---
  - type: web
    name: chats-service
    env: docker
    dockercontext: ./chats-service
    dockerfilePath: ./chats-service/Dockerfile
    plan: free
    envVars:
      - key: MESSAGE_DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis-chat
          property: connectionString

  # --- Customers Service ---
  - type: web
    name: customers-service
    env: docker
    dockercontext: ./customers-service
    dockerfilePath: ./customers-service/Dockerfile
    plan: free
    envVars:
      - key: CUSTOMER_DATABASE_URL
        fromDatabase:
          name: customer-db
          property: connectionString

  # --- Employees Service ---
  - type: web
    name: employees-service
    env: docker
    dockercontext: ./employees-service
    dockerfilePath: ./employees-service/Dockerfile
    plan: free
    envVars:
      - key: EMPLOYEE_DATABASE_URL
        fromDatabase:
          name: employee-db
          property: connectionString

  # --- Managed Redis Cache ---
  - type: redis
    name: redis-chat
    plan: free
    ipAllowList: [] # Blocks external internet traffic; only your services can connect

# --- Managed PostgreSQL Databases ---
databases:
  - name: product-db
    plan: free
  - name: order-db
    plan: free
  - name: chat-db
    plan: free
  - name: customer-db
    plan: free
  - name: employee-db
    plan: free
