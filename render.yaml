services:
  # --- Products Service ---
  - type: web
    name: products-service
    env: docker
    dockercontext: ./products-service
    dockerfilePath: ./products-service/Dockerfile
    plan: free # or starter
    envVars:
      - key: PRODUCT_DATABASE_URL
        fromDatabase:
          name: product-db
          property: connectionString

  # --- Orders Service ---
  - type: web
    name: orders-service
    env: docker
    dockercontext: ./orders-service
    dockerfilePath: ./orders-service/Dockerfile
    plan: free
    envVars:
      - key: ORDER_DATABASE_URL
        fromDatabase:
          name: order-db
          property: connectionString

  # --- Chats Service ---
  - type: web
    name: chats-service
    env: docker
    dockercontext: ./chats-service
    dockerfilePath: ./chats-service/Dockerfile
    plan: free
    envVars:
      - key: MESSAGE_DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis-chat
          property: connectionString

  # --- Managed Redis ---
  - type: redis
    name: redis-chat
    plan: free
    ipAllowList: [] # Secures it so only your services can talk to it

# --- Managed Databases ---
databases:
  - name: product-db
    plan: free
  - name: order-db
    plan: free
  - name: chat-db
    plan: free
